services:
  api:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - PYTHONUNBUFFERED=1
      - MEIRO_DOMAIN=${MEIRO_DOMAIN:-}
      - MEIRO_USERNAME=${MEIRO_USERNAME:-}
      - MEIRO_PASSWORD=${MEIRO_PASSWORD:-}
      - MEIRO_TIMEOUT_MS=${MEIRO_TIMEOUT_MS:-15000}
      - MEIRO_TARGET_INSTANCE_URL=${MEIRO_TARGET_INSTANCE_URL:-https://meiro-internal.eu.pipes.meiro.io}
      - MEIRO_PRISM_BASE_URL=${MEIRO_PRISM_BASE_URL:-https://meiro-internal.eu.pipes.meiro.io}
      - MEIRO_STRICT_INSTANCE_SCOPE=${MEIRO_STRICT_INSTANCE_SCOPE:-1}
      - DECIENGINE_API_KEY=${DECIENGINE_API_KEY:-local-write-key}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-0}
    volumes:
      - ./backend:/app

  web:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      - VITE_API_BASE=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
